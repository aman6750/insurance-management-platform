spring.application.name=insurance-platform
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/insurance_db
spring.datasource.username=postgres
spring.datasource.password=Shriman
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=ThisIsMyInsurancePlatformSecretKeyForJwtSigning2026MakeItLongEnough
app.jwt.expiration-ms=86400000

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

springdoc.swagger-ui.path=/swagger-ui.html
logging.level.com.insurance=DEBUG